; -----------------------------
; Конфиг лабораторной №1 (АЗС)
; -----------------------------
; type топлива:
;   0 = АИ-76
;   1 = АИ-92
;   2 = АИ-95
;
; Времена задаются В СЕКУНДАХ (можно дробные).
; Пример: mean=1, stddev=0.5 => в среднем 1 сек, разброс 0.5 сек.
;
; Размер очереди (максимум машин в общей очереди).
number_message_queue = 15

; Кол-во заявок (по методичке надо >= 150).
requests = 150

; -----------------------------
; Генератор заявок (производитель)
; -----------------------------
[create]
; средняя пауза между новыми машинами (сек)
mean = 1
; стандартное отклонение паузы (сек)
stddev = 0.5

; -----------------------------
; Колонки (потребители)
; -----------------------------

[station 1]
type = 0
handle.mean = 5
handle.stddev = 0.5

[station 2]
type = 0
handle.mean = 6
handle.stddev = 0.5

[station 3]
type = 1
handle.mean = 3
handle.stddev = 0.6

[station 4]
type = 1
handle.mean = 12.5
handle.stddev = 0.6

[station 5]
type = 2
handle.mean = 5
handle.stddev = 0.7